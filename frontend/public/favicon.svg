<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
    <defs>
      <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#16161e"/>
        <stop offset="100%" stop-color="#0c0c12"/>
      </linearGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="0.96" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      </filter>
    </defs>

    <!-- Background -->
    <rect width="64" height="64" rx="12" fill="url(#bg)"/>

    <!-- Subtle border -->
    <rect x="4" y="4" width="56" height="56" rx="8" fill="none" stroke="#6dd400" stroke-width="0.96" opacity="0.2"/>

    <!-- Circuit traces decoration -->
    <g opacity="0.12" stroke="#6dd400" stroke-width="0.512" fill="none" stroke-linecap="round">
      <path d="M7.68,19.2 L7.68,9.6 L16,9.6"/>
      <circle cx="7.68" cy="19.2" r="0.96" fill="#6dd400"/>
      <path d="M56.32,44.8 L56.32,54.4 L48,54.4"/>
      <circle cx="56.32" cy="44.8" r="0.96" fill="#6dd400"/>
    </g>

    <!-- C&O text with glow -->
    <g filter="url(#glow)">
      <text x="19.2" y="42.88" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="25.6px" fill="#6dd400">C</text>
      <text x="32" y="35.2" text-anchor="middle" font-family="Arial,sans-serif" font-weight="700" font-size="11.52px" fill="#8fff1a" opacity="0.85">&amp;</text>
      <text x="46.08" y="42.88" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="25.6px" fill="#6dd400">O</text>
    </g>

    <!-- Wrench icon accent (top-right) -->
    <g transform="translate(49.92, 7.68) rotate(45)" opacity="0.45">
      <rect x="-0.64" y="0" width="1.28" height="7.68" rx="0.32" fill="#6dd400"/>
      <circle cx="0" cy="0" r="1.6" fill="none" stroke="#6dd400" stroke-width="0.512"/>
    </g>

    <!-- Bottom tagline for very large versions -->
    
  </svg>